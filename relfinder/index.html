<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RelFinder</title>
    <!-- process.nextTick polyfill — Comunica needs it; must run before any module -->
    <script>
      (function () {
        var p = globalThis.process;
        if (!p) { globalThis.process = { env: {}, nextTick: queueMicrotask }; return; }
        if (typeof p.nextTick !== 'function') p.nextTick = queueMicrotask;
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
